<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2563eb" />
  <title>MG인재개발원 여신업무방법서 학습 지원</title>
  <link rel="stylesheet" href="styles.css?v=8" />
</head>
<body>
  <header class="topbar">
    <div class="hero">
      <h1 class="app-title">
        <span>MG인재개발원</span>
        <span>여신업무방법서 학습 지원</span>
      </h1>
      <p class="manual-version">기준: 2026.03 개정</p>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="search" onclick="setTab('search', this)">방법서 검색</button>
    <button class="tab" data-tab="quiz" onclick="setTab('quiz', this)">학습용 문제</button>
  </nav>

  <main class="layout">
    <section id="searchTab" class="tab-panel active">
      <section class="card search-card">
        <h2>방법서 검색</h2>
        <p class="subtext">키워드로 조문을 찾고, 필요할 때만 목차 버튼으로 편·장을 선택합니다.</p>
        <div class="search-row">
          <input id="searchInput" type="search" placeholder="예: 동일인, 금리인하, 중도상환수수료" enterkeyhint="search" />
          <button class="primary-btn" onclick="runSearch()">검색</button>
          <button class="secondary-btn" onclick="openToc()">목차로 찾기</button>
        </div>
        <div class="search-help"><span id="resultInfo">전체 조문 로딩 중...</span></div>
      </section>
      <section id="results" class="results"></section>
    </section>

    <section id="quizTab" class="tab-panel">
      <section class="card quiz-card">
        <h2>학습용 문제</h2>
        <p class="subtext">부칙·시행일·경과조치 관련 문항은 제외하고 표시합니다.</p>
        <div class="quiz-actions"><button class="primary-btn" onclick="startQuiz()">문제 시작</button></div>
        <div id="quizArea"></div>
      </section>
    </section>
  </main>

  <div id="tocModal" class="modal hidden" onclick="backdropClose(event)">
    <div class="modal-sheet card">
      <div class="modal-head">
        <div>
          <h3>목차로 찾기</h3>
          <p>편을 펼친 뒤 장을 선택하면 해당 범위 조문만 보여줍니다.</p>
        </div>
        <button class="icon-btn" onclick="closeToc()">✕</button>
      </div>
      <div id="tocList" class="toc-list"></div>
    </div>
  </div>

  <footer class="footer-note">
    주의사항 : 교육용 웹앱으로 업데이트 및 기타세부사항은 직접 엠지니를 활용하시기 바랍니다.
  </footer>

  <script src="app.js?v=8"></script>
</body>
</html>
